    // 보기 4개 생성 (정답 1 + 오답 3)
    let options = [currentWord];
    while (options.length < 4) {
        let randomWord = wordData[Math.floor(Math.random() * wordData.length)];
        if (!options.some(o => o.en === randomWord.en)) options.push(randomWord);
    }
    options.sort(() => 0.5 - Math.random());

    options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = (quizType === 'en-ko') ? opt.ko : opt.en;
        btn.onclick = () => checkAnswer(opt.en === currentWord.en, currentWord);
        optionsContainer.appendChild(btn);
    });
}

function checkAnswer(isCorrect, word) {
    if (isCorrect) {
        score += 2;
        document.getElementById('score-now').innerText = "Score: " + score;
    } else {
        wrongList.push(word);
    }
    currentIndex++;
    showQuestion();
}

function showResult() {
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    document.getElementById('final-score').innerText = score + "점";

    if (wrongList.length > 0) {
        document.getElementById('wrong-container').classList.remove('hidden');
        const wrongAnswersEl = document.getElementById('wrong-answers');
        wrongAnswersEl.innerHTML = '';
        wrongList.forEach(w => {
            const div = document.createElement('div');
            div.className = 'wrong-item';
            div.innerText = "❌ " + w.en + " : " + w.ko;
            wrongAnswersEl.appendChild(div);
        });
    }
}
</script>
